instance_name: "My Home Hub"

# --- Authentication ---
# legacy: optional shared password (see password below)
# firebase: Google sign-in via Firebase (recommended for public internet)
auth:
  mode: legacy  # or: firebase
  firebase:
    api_key: ""
    auth_domain: ""
    project_id: ""
    app_id: ""
  allowed_emails: []   # required for firebase, e.g. - family@gmail.com
  admin_emails: []     # can change expense settings, site notice, etc.
  display_names: {}    # email: "Display Name" used on created items

password: "" # legacy only; leave blank for open LAN or set for shared password
admin_name: "Administrator"
feature_toggles:
  shopping_list: true
  media_downloader: true
  pdf_compressor: true
  qr_generator: true
  notes: true
  shared_cloud: true
  who_is_home: true
  personal_status: true
  chores: true
  recipes: true
  expiry_tracker: true
  url_shortener: true
  expense_tracker: true
  calendar: true
  school: true

# Homeschool / School module (roles by display name in legacy; Firebase uses display_names)
school:
  teachers: []          # e.g. - Mom
  students: []          # e.g. - Alice
  parent_observers: {}  # parent display name -> list of child display names
  # Site admins (auth.admin_emails / admin_name) are always school_admin

# Hardening for public deployment (media + QR / WiFi)
hardening:
  media_downloader:
    allowed_domains:
      - youtube.com
      - www.youtube.com
      - youtu.be
      - m.youtube.com
      - vimeo.com
    max_filesize_mb: 500
    max_concurrent_per_user: 2
    download_timeout_minutes: 45
    rate_limit: "8 per hour"
    admin_only: false
  qr_generator:
    max_payload_length: 2048
    store_wifi_history: false   # WiFi QRs shown once; passwords not stored
    history_retention_days: 7
    encrypt_payloads: true
    admin_only_wifi: false      # set true to restrict WiFi QRs to admin_emails

family_members:
  - Mom
  - Dad
  - Dipanshu
  - Vivek
  - India

# Legal pages for OAuth consent screen (/privacy, /terms) — set contact for your household
legal:
  contact_email: "you@gmail.com"
  policy_updated: "2026-06-01"

# Google Calendar bidirectional sync (requires auth.mode: firebase)
google_calendar:
  enabled: false
  client_id: ""
  client_secret: ""   # or set GOOGLE_CALENDAR_CLIENT_SECRET env
  sync_interval_minutes: 15
  default_timezone: "America/Chicago"
  onboarding_all_calendars_enabled: true

reminders:
  # time_format controls how reminder times are displayed in the UI.
  # Allowed values: "12h" (default) or "24h". Remove or leave blank to fall back to 12h.
  time_format: 12h

  # calendar_start_day controls which day the reminders calendar starts on.
  # Accepts full weekday names (sunday..saturday) or numeric 0-6 where 0=Sunday.  
  calendar_start_day: sunday #default is Sunday
  # default_timezone for new events when not set per-event (IANA, e.g. America/Chicago)
  default_timezone: "America/Chicago"

  # Example reminder categories (keys lowercase no spaces recommended)
  categories:
    - key: health
      label: Health
      color: "#dc2626"
    - key: bills
      label: Bills
      color: "#0d9488"
    - key: school
      label: School
      color: "#7c3aed"
    - key: family
      label: Family
      color: "#2563eb"

weather:
  enabled: false
  label: "" # optional location label (appears on right of header). Leave blank to hide.
  latitude: "" # optional, leave empty to use browser geolocation
  longitude: "" # optional, leave empty to use browser geolocation
  timezone: "" # optional, e.g., "Europe/Kyiv" or "America/New_York"; if unset, API uses timezone=auto
  units: metric # metric or imperial (default: metric)
  view: compact # compact or detailed (detailed also shows today's forecast: sunrise, sunset, UV, rain %, highs/lows)

#Optional
theme:
  primary_color: "#1d4ed8"
  secondary_color: "#a0aec0"
  background_color: "#f7fafc"
  card_background_color: "#fff"
  text_color: "#333"
  sidebar_background_color: "#2563eb"
  sidebar_text_color: "#ffffff"
  sidebar_link_color: "rgba(255,255,255,0.95)"
  sidebar_link_border_color: "rgba(255,255,255,0.18)"
  sidebar_active_color: "#3b82f6"
