# Production: HomeHub only (no Caddy — use your existing reverse proxy).
#
# HomeHub listens on 127.0.0.1:5000 by default so only the host (or containers
# with host access) can reach it. Point your existing Caddy at that address.
#
# Usage:
#   cp .env.example .env
#   cp config-example.yml config.yml
#   docker compose -f compose.prod.yml up -d --build
#
# Caddy config: see deploy/Caddyfile.snippet and docs/DEPLOY.md

services:
  homehub:
    container_name: homehub
    build: .
    restart: unless-stopped
    ports:
      - "${HOMEHUB_BIND:-127.0.0.1:5000}:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./media:/app/media
      - ./pdfs:/app/pdfs
      - ./data:/app/data
      - ./config.yml:/app/config.yml:ro
      - ${FIREBASE_SERVICE_ACCOUNT_FILE:-./secrets/firebase-service-account.json}:/run/secrets/firebase-sa.json:ro
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      TRUST_PROXY: "1"
      SESSION_COOKIE_SECURE: "1"
      FIREBASE_SERVICE_ACCOUNT_FILE: /run/secrets/firebase-sa.json
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      SESSION_DAYS: ${SESSION_DAYS:-14}
    networks:
      - homehub_internal
      - proxy

networks:
  homehub_internal:
    name: homehub_internal
    driver: bridge
  proxy:
    name: ${PROXY_NETWORK:-reverseproxy-nw}
    external: true
