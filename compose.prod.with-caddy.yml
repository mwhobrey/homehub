# Standalone stack WITH bundled Caddy — only if ports 80/443 are free.
# docker compose -f compose.prod.with-caddy.yml up -d --build

services:
  caddy:
    image: caddy:2-alpine
    container_name: homehub-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - homehub_internal
    depends_on:
      - homehub

  homehub:
    container_name: homehub
    build: .
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - ./uploads:/app/uploads
      - ./media:/app/media
      - ./pdfs:/app/pdfs
      - ./data:/app/data
      - ./config.yml:/app/config.yml:ro
      - ./secrets:/run/secrets:ro
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      TRUST_PROXY: "1"
      SESSION_COOKIE_SECURE: "1"
      FIREBASE_SERVICE_ACCOUNT_FILE: /run/secrets/firebase-service-account.json
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      SESSION_DAYS: ${SESSION_DAYS:-14}
    networks:
      - homehub_internal

networks:
  homehub_internal:
    name: homehub_internal
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
